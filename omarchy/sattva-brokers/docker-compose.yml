services:
  # === NEXTCLOUD & n8n DATABASE ===
  postgres-core:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=sattva
      - POSTGRES_PASSWORD=sattva_fortress_secure
      - POSTGRES_DB=nextcloud
    volumes:
      - /srv/sattva-brokers/postgres:/var/lib/postgresql/data
    networks:
      - fortress_net

  # === ODOO DATABASE ===
  postgres-odoo:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=sattva_odoo_secure
      - POSTGRES_DB=postgres
    volumes:
      - /srv/sattva-brokers/postgres-odoo:/var/lib/postgresql/data
    networks:
      - fortress_net

  # === NEXTCLOUD (WORM VAULT) ===
  nextcloud:
    image: nextcloud:latest
    restart: always
    environment:
      - POSTGRES_HOST=postgres-core
      - POSTGRES_USER=sattva
      - POSTGRES_PASSWORD=sattva_fortress_secure
      - POSTGRES_DB=nextcloud
      - NEXTCLOUD_TRUSTED_DOMAINS=localhost 127.0.0.1 ${TAILSCALE_IP:-100.*.*.*} nextcloud
    volumes:
      - /srv/sattva-brokers/nextcloud:/var/www/html
    networks:
      - fortress_net
    depends_on:
      - postgres-core

  # === n8n (INTEGRATION BRIDGE) ===
  n8n:
    image: docker.n8n.io/n8nio/n8n
    restart: always
    environment:
      - N8N_HOST=${TAILSCALE_IP:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - N8N_SECURE_COOKIE=false
      - WEBHOOK_URL=http://${TAILSCALE_IP:-localhost}:5679/
      - GENERIC_TIMEZONE=America/Toronto
    volumes:
      - /srv/sattva-brokers/n8n:/home/node/.n8n
    networks:
      - fortress_net

  # === ODOO CE 18 (ERP BACKBONE) ===
  odoo:
    image: odoo:18.0
    restart: always
    depends_on:
      - postgres-odoo
    ports:
      - "8069:8069"
    volumes:
      - /srv/sattva-brokers/odoo-web:/var/lib/odoo
      - /srv/sattva-brokers/odoo-addons:/mnt/extra-addons
    environment:
      - HOST=postgres-odoo
      - USER=odoo
      - PASSWORD=sattva_odoo_secure
    networks:
      - fortress_net

  # === GITHUB SSO PROXIES ===
  nextcloud-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:latest
    restart: always
    ports:
      - "8088:4180"
    environment:
      - OAUTH2_PROXY_PROVIDER=github
      - OAUTH2_PROXY_CLIENT_ID=${GITHUB_CLIENT_ID}
      - OAUTH2_PROXY_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - OAUTH2_PROXY_GITHUB_ORG=${GITHUB_ORG_NAME}
      - OAUTH2_PROXY_COOKIE_SECRET=${COOKIE_SECRET}
      - OAUTH2_PROXY_EMAIL_DOMAINS=*
      - OAUTH2_PROXY_HTTP_ADDRESS=0.0.0.0:4180
      - OAUTH2_PROXY_COOKIE_SECURE=false
      - OAUTH2_PROXY_UPSTREAMS=http://nextcloud:80
      - OAUTH2_PROXY_REDIRECT_URL=http://100.114.140.23:8088/oauth2/callback
    networks:
      - fortress_net

  n8n-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:latest
    restart: always
    ports:
      - "5679:4180"
    environment:
      - OAUTH2_PROXY_PROVIDER=github
      - OAUTH2_PROXY_CLIENT_ID=${N8N_GITHUB_CLIENT_ID}
      - OAUTH2_PROXY_CLIENT_SECRET=${N8N_GITHUB_CLIENT_SECRET}
      - OAUTH2_PROXY_GITHUB_ORG=${GITHUB_ORG_NAME}
      - OAUTH2_PROXY_COOKIE_SECRET=${COOKIE_SECRET}
      - OAUTH2_PROXY_EMAIL_DOMAINS=*
      - OAUTH2_PROXY_HTTP_ADDRESS=0.0.0.0:4180
      - OAUTH2_PROXY_COOKIE_SECURE=false
      - OAUTH2_PROXY_UPSTREAMS=http://n8n:5678
      - OAUTH2_PROXY_REDIRECT_URL=http://100.114.140.23:5679/oauth2/callback
    networks:
      - fortress_net

networks:
  fortress_net:
    driver: bridge